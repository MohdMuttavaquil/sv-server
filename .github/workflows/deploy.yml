name : Deploy on aws ec2

on: 
    push:
        branches:
            - main

jobs: 
    test:
       runs-on: ubuntu-latest
       steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: stert server
          env: 
            DB_CONNACTION: ${{ secrets.DB_CONNACTION }} 
            RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          run: |
            cd backend
            npm install
            npm start & 
            sleep 5
            echo "Server started successfully"
 